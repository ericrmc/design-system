independent_claim: "The missing concept is not 'non-Claude participation' but ROLE-FUNCTION INTEGRITY. A role whose purpose is to stand outside the Claude workspace cannot be instantiated by a Claude subagent, even with a perfect stance brief, because the structural relation is part of the role. Operator's position is scoped to any deliberation where the engine USES THE ROLE NAME 'Outsider' — not to every deliberation. If the engine invokes 'Outsider' as a role, non-Claude lineage is part of the role's function, not an optional transport detail. If no non-Claude participant is available, the engine may convene an 'Internal Frame Challenger' or 'Adversarial Reviewer' but should not call it Outsider. Also surfaces an additional cause operator did not name: MAD v4 Shape A's phrase 'indistinguishable in role from the Claude perspectives' encouraged role-fungibility thinking — made 'add a non-Claude perspective' look equivalent to 'preserve the Outsider function,' which it is not. Residual gap warning: broader role/lineage discipline — engine must ask for each named perspective whether its function depends on structural position, training lineage, operator relation, or synthesis timing. Preferred Q4 formulation: MAD v4 defines Outsider as a lineage-constrained role in Claude-hosted deliberations."
