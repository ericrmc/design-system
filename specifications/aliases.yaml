# Selvedge alias vocabulary.
#
# Schema versioned per specifications/retrieval-contract.md v1 §2.3.
# Two-label phase-1 (canonical + aliases[]). Phase-3+ may migrate to SKOS
# three-label (prefLabel / altLabel / hiddenLabel) by bumping schema_version.
#
# Each entry lets `resolve_id(alias)` map surface forms to a canonical id
# string that build_retrieval_index.py can anchor to a specific source file.
#
# Populated incrementally as aliases surface. Keep this file compact.

